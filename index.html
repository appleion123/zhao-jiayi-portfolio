#aurora-bg{overflow:hidden}
#aurora-bg::before,#aurora-bg::after,#aurora-bg i{content:"";position:absolute;border-radius:50%;filter:blur(80px);animation:auroraFloat 12s ease-in-out infinite alternate;mix-blend-mode:screen}
#aurora-bg::before{background:#7DD4D0;width:55%;height:55%;top:-5%;left:-5%;opacity:0.35}
#aurora-bg::after{background:#5ABFBA;width:45%;height:45%;bottom:-5%;right:-5%;opacity:0.3;animation-duration:16s;animation-delay:-5s}
#aurora-bg i:first-child{background:#96E0DC;width:35%;height:35%;top:40%;left:30%;opacity:0.2;animation-duration:14s;animation-delay:-3s}
#aurora-bg i:last-child{background:#3DAFAA;width:30%;height:30%;top:20%;left:60%;opacity:0.2;animation-duration:11s;animation-delay:-7s}
@keyframes auroraFloat{0%{transform:translate(0,0) scale(1)}100%{transform:translate(30px,-20px) scale(1.15)}}
</style>
</head>
